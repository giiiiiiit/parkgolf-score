<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <title>파크골프 스코어 집계</title>
  <meta name="description" content="파크골프 대회 스코어를 사진으로 집계하는 앱">

  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#2d7a3a">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="파크골프">
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png">

  <link rel="stylesheet" href="./css/style.css">
</head>
<body>

  <!-- ── 공통 헤더 ── -->
  <header class="app-header">
    <h1>⛳ 파크골프 스코어 집계</h1>
  </header>

  <!-- ── 화면 1: 홈 (대회 목록) ── -->
  <div id="screen-home" class="screen active">
    <div class="screen-body">
      <div class="section-header">
        <span class="section-title">대회 목록</span>
      </div>
      <div id="tournament-list" class="card-list"></div>
      <button id="btn-new-tournament" class="btn btn-primary btn-lg">
        + 새 대회 만들기
      </button>
    </div>
  </div>

  <!-- ── 화면 2: 새 대회 만들기 ── -->
  <div id="screen-new-tournament" class="screen">
    <div class="screen-body">
      <div class="section-header">
        <span class="section-title">새 대회 만들기</span>
      </div>
      <div class="card">
        <form id="form-new-tournament">
          <div class="form-group">
            <label class="form-label">대회 이름</label>
            <input id="input-tournament-name" class="form-input" type="text"
              placeholder="예) 6월 정기대회" maxlength="30" required>
          </div>
          <div class="form-group">
            <label class="form-label">날짜</label>
            <input id="input-tournament-date" class="form-input" type="date" required>
          </div>
          <div class="form-hint">PAR 합계: 132 (A·B·C·D 각 33)</div>
          <button type="submit" class="btn btn-primary btn-lg" style="margin-top:20px;">저장</button>
          <button type="button" id="btn-cancel-tournament" class="btn btn-secondary btn-lg">취소</button>
        </form>
      </div>
    </div>
  </div>

  <!-- ── 화면 3: 명단 관리 ── -->
  <div id="screen-roster" class="screen">
    <div class="screen-body">
      <div class="section-header">
        <button id="btn-roster-back" class="btn-back">← 목록</button>
        <div>
          <div class="section-title" id="roster-title"></div>
          <div class="section-sub" id="roster-date"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">참가자 명단</div>
        <div class="attend-hint">체크 = 오늘 대회 참석</div>
        <div id="participant-list" class="participant-list"></div>
      </div>

      <div class="card">
        <div class="card-title">참가자 추가</div>
        <form id="form-add-participant" class="add-form">
          <input id="input-participant-name" class="form-input" type="text"
            placeholder="이름 입력" maxlength="10" autocomplete="off">
          <button type="submit" class="btn btn-primary">추가</button>
        </form>
      </div>
    </div>
  </div>

  <!-- ── 화면 4: 점수 목록 ── -->
  <div id="screen-score-list" class="screen">
    <div class="screen-body">
      <div class="section-header">
        <button id="btn-scorelist-back" class="btn-back">← 명단</button>
        <div>
          <div class="section-title" id="scorelist-title"></div>
          <div class="section-sub" id="scorelist-date"></div>
        </div>
      </div>
      <div id="score-list-items" class="card-list"></div>
    </div>
  </div>

  <!-- ── 화면 5: 점수 입력 ── -->
  <div id="screen-score-entry" class="screen">
    <div class="screen-body">
      <div class="section-header">
        <button id="btn-entry-back" class="btn-back">← 목록</button>
        <div class="section-title" id="entry-name"></div>
      </div>

      <div class="card">
        <div class="score-grid">
          <div class="score-row">
            <span class="course-label">A 코스 <small>PAR 33</small></span>
            <input id="score-A" class="score-input" type="number" inputmode="numeric"
              min="1" max="99" placeholder="–">
          </div>
          <div class="score-row">
            <span class="course-label">B 코스 <small>PAR 33</small></span>
            <input id="score-B" class="score-input" type="number" inputmode="numeric"
              min="1" max="99" placeholder="–">
          </div>
          <div class="score-row">
            <span class="course-label">C 코스 <small>PAR 33</small></span>
            <input id="score-C" class="score-input" type="number" inputmode="numeric"
              min="1" max="99" placeholder="–">
          </div>
          <div class="score-row">
            <span class="course-label">D 코스 <small>PAR 33</small></span>
            <input id="score-D" class="score-input" type="number" inputmode="numeric"
              min="1" max="99" placeholder="–">
          </div>
        </div>

        <div class="score-total-row">
          <span class="score-total-label">합계</span>
          <span id="score-total-display" class="score-total-val">–</span>
          <span id="score-par-diff" class="par-diff"></span>
        </div>
      </div>

      <div id="score-mismatch-warn" class="warn-box" style="display:none;">
        ⚠️ 수기 합계와 다릅니다. A+B+C+D 값으로 저장됩니다.
      </div>

      <button id="btn-save-score" class="btn btn-primary btn-lg">저장</button>
      <button id="btn-clear-score" class="btn btn-secondary btn-lg">입력 초기화</button>
    </div>
  </div>

  <!-- ── 확인 모달 ── -->
  <div id="modal-confirm" class="modal-overlay">
    <div class="modal-box">
      <p id="modal-msg"></p>
      <div class="modal-actions">
        <button id="modal-yes" class="btn btn-primary">확인</button>
        <button id="modal-no" class="btn btn-secondary">취소</button>
      </div>
    </div>
  </div>

  <!-- ── 토스트 ── -->
  <div id="toast" class="toast"></div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
